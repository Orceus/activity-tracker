name: ActivityX
run-name: "ActivityX ${{ github.ref_name }}"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build tracker exe
        run: pyinstaller activity_tracker.spec --clean

      - name: Build controller exe
        run: pyinstaller activity_tracker_controller.spec --clean

      - name: Write version.txt
        shell: bash
        run: |
          echo "${GITHUB_REF_NAME:-dev}" > dist/version.txt

      - name: Copy supporting files
        shell: cmd
        run: |
          copy setup.bat dist\setup.bat
          copy config.py dist\config.py

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ActivityX-Windows
          path: dist/
          retention-days: 30

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: ActivityX-Windows
          path: release/windows

      - name: Zip release
        run: |
          cd release
          zip -r ActivityX-Windows-${{ github.ref_name }}.zip windows/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ActivityX-Windows-${{ github.ref_name }}.zip
            release/windows/activity_tracker.exe
            release/windows/activity_tracker_controller.exe
            release/windows/version.txt
          body: |
            ## ActivityX Employee Tracker ${{ github.ref_name }}

            ### Installation
            1. Extract the zip
            2. Run `setup.bat`
            3. Done — tracker runs silently in the background
